<section class="change-password-page">
  <div class="auth-card card">
    <header>
      <h1>החלפת סיסמה</h1>
      <p class="auth-card__intro">לפני המשך העבודה יש לבחור סיסמה חדשה.</p>
    </header>
    <form class="form-component change-password-page__form" novalidate>
      <div class="form-component__message" role="alert" hidden></div>
      <div class="form-component__field">
        <label for="current-password">סיסמה נוכחית</label>
        <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required>
      </div>
      <div class="form-component__field">
        <label for="new-password">סיסמה חדשה</label>
        <input id="new-password" name="newPassword" type="password" autocomplete="new-password" minlength="8" required aria-describedby="password-help">
        <span id="password-help" class="form-component__help">לפחות 8 תווים.</span>
      </div>
      <div class="form-component__field">
        <label for="confirm-password">אימות סיסמה חדשה</label>
        <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <button class="button-component button-component--primary" type="submit">שמירת סיסמה</button>
    </form>
  </div>
</section>
