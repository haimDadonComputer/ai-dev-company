<section class="login-page">
  <div class="auth-card card">
    <header>
      <h1>כניסה למערכת</h1>
      <p class="auth-card__intro">הזינו את פרטי מנהל המערכת.</p>
    </header>
    <form class="form-component login-page__form" novalidate>
      <div class="form-component__message" role="alert" hidden></div>
      <div class="form-component__field">
        <label for="login-username">שם משתמש</label>
        <input id="login-username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="form-component__field">
        <label for="login-password">סיסמה</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="button-component button-component--primary" type="submit">התחברות</button>
    </form>
  </div>
</section>
