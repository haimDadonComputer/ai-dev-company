<section class="admin-general-page">
  <header class="page-header">
    <h1>כללי</h1>
    <p>ניהול פרטי האתר, הלוגו ותמונות התצוגה.</p>
  </header>
  <form class="form-component admin-general-page__form card" novalidate>
    <div class="form-component__message" role="alert" hidden></div>
    <div class="form-component__grid">
      <div class="form-component__field">
        <label for="site-name">שם האתר</label>
        <input id="site-name" name="siteName" type="text" maxlength="120" required>
      </div>
      <div class="form-component__field">
        <label for="site-slogan">סלוגן</label>
        <input id="site-slogan" name="slogan" type="text" maxlength="180">
      </div>
      <div class="form-component__field">
        <label for="site-phone">מספר טלפון</label>
        <input id="site-phone" name="phone" type="tel" autocomplete="tel" maxlength="30">
      </div>
      <div class="form-component__field">
        <label for="site-email">אימייל</label>
        <input id="site-email" name="email" type="email" autocomplete="email" maxlength="190">
      </div>
      <div class="form-component__field">
        <label for="site-whatsapp">WhatsApp</label>
        <input id="site-whatsapp" name="whatsapp" type="text" maxlength="100">
      </div>
      <div class="form-component__field">
        <label for="site-instagram">Instagram</label>
        <input id="site-instagram" name="instagram" type="text" maxlength="190">
      </div>
    </div>
    <div class="form-component__field">
      <label for="site-address">כתובת</label>
      <textarea id="site-address" name="address" maxlength="300"></textarea>
    </div>
    <fieldset class="admin-general-page__media-section">
      <legend>לוגו האתר</legend>
      <div class="form-component__field">
        <label for="logo-media">בחירת לוגו מהמדיה</label>
        <select id="logo-media" name="logoMediaId">
          <option value="">ללא לוגו</option>
        </select>
      </div>
      <div class="admin-general-page__logo-preview" aria-live="polite"></div>
    </fieldset>
    <fieldset class="admin-general-page__media-section">
      <legend>תמונות האתר</legend>
      <p class="form-component__help">בחרו תמונה אחת או יותר מתוך ספריית המדיה.</p>
      <div class="admin-general-page__image-options"></div>
    </fieldset>
    <div class="form-component__actions">
      <button class="button-component button-component--primary" type="submit">שמירת הגדרות</button>
      <a class="button-component button-component--secondary admin-general-page__media-link" href="/admin/media" data-link>מעבר להעלאת מדיה</a>
    </div>
  </form>
</section>
